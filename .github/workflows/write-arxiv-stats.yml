---
name: Update arxiv.org stats
on:
  schedule:
    # https://crontab.guru/every-day
    - cron: "0 0 * * *"
  workflow_dispatch:
env:
  OUT_DIR: './data'
  APP_DIR: './app'
  PY_VER: '3.10'
jobs:
  updateArxivCsv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6     
      - name: Setup python ${{ env.PY_VER }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PY_VER }}
          cache: 'pip'
      - run: pip install -qqr ${{ env.APP_DIR }}/requirements.txt
      - name: Run arxiv stats
        env:
          INCLUDE_CITATIONS: ${{ vars.INCLUDE_CITATIONS || 'false' }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY || '' }}
        run: python ${{ env.APP_DIR }}/app.py
      - name: Commit via PR if changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          find "$OUT_DIR" -type f | xargs git add
          git diff --cached --quiet && echo "No changes. Nothing to do." && exit 0
          DATE=$(date -u +%Y%m%d-%H%M%S)
          BRANCH="auto-update-$DATE"
          BASE_SHA=$(gh api "repos/$REPO/git/ref/heads/main" --jq '.object.sha')
          BASE_TREE=$(gh api "repos/$REPO/git/commits/$BASE_SHA" --jq '.tree.sha')
          echo '[]' > /tmp/tree_entries.json
          git diff --cached --name-only | while IFS= read -r file; do
            CONTENT=$(base64 -w0 "$file")
            BLOB_SHA=$(gh api "repos/$REPO/git/blobs" -f content="$CONTENT" -f encoding=base64 --jq '.sha')
            jq --arg path "$file" --arg sha "$BLOB_SHA" \
              '. + [{"path": $path, "mode": "100644", "type": "blob", "sha": $sha}]' \
              /tmp/tree_entries.json > /tmp/tree_entries_tmp.json && mv /tmp/tree_entries_tmp.json /tmp/tree_entries.json
          done
          NEW_TREE=$(gh api "repos/$REPO/git/trees" \
            --input <(jq -n --arg base "$BASE_TREE" --slurpfile tree /tmp/tree_entries.json \
              '{base_tree: $base, tree: $tree[0]}') --jq '.sha')
          COMMIT_SHA=$(gh api "repos/$REPO/git/commits" \
            --input <(jq -n --arg msg "Updated $OUT_DIR" --arg tree "$NEW_TREE" --arg parent "$BASE_SHA" \
              '{message: $msg, tree: $tree, parents: [$parent]}') --jq '.sha')
          gh api "repos/$REPO/git/refs" -f ref="refs/heads/$BRANCH" -f sha="$COMMIT_SHA"
          PR_NUM=$(gh api "repos/$REPO/pulls" \
            -f title="chore: update $OUT_DIR" \
            -f body="Auto-generated by write-arxiv-stats workflow." \
            -f head="$BRANCH" -f base=main --jq '.number')
          gh api "repos/$REPO/pulls/$PR_NUM/merge" -X PUT \
            -f merge_method=squash \
            -f commit_title="chore: update $OUT_DIR"
...
